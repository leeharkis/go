<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lee Harkis | Home</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: flex-start; /* Aligns container to the left */
            align-items: flex-start;     /* Aligns container to the top */
            padding: 30px;               /* Keeps it slightly offset from the edge */
            
            /* Fullscreen Background Configuration */
            background-image: url('IMG_20150404_194053.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .container {
            /* Frosted glass menu box */
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 360px; /* Slightly narrower profile for the corner spot */
            text-align: center;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 6px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .link-section h2 {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            font-weight: 500;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            display: block;
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 1.05rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease-in-out;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* Subtle button descriptions matching the layout layout */
        .btn span {
            display: block;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 3px;
            font-weight: 400;
            word-break: break-all;
        }

        .btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Mobile responsive adjustments */
        @media (max-width: 480px) {
            body {
                padding: 15px;
                justify-content: center; /* Center on tiny screens for accessibility */
                align-items: center;
            }
            .container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Lee Harkis</h1>
        </header>

        <main class="link-section">
            <h2>  </h2>
            
            <div class="links-grid">
                <a href="https://leeharkis.github.io/playwordle/index.html" class="btn" target="_blank" rel="noopener">
                    Wordle Solver
                </a>
                <a href="https://leeharkis.github.io/playwordle/play.html" class="btn" target="_blank" rel="noopener">
                    Play Wordle
                </a>
                <a href="https://leeharkis.github.io/boggle" class="btn" target="_blank" rel="noopener">
                    Play Boggle
                </a>
            </div>
        </main>
    </div>

</body>
</html>
